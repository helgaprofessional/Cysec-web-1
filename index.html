<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #0e0e0e;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 3rem; letter-spacing: -1px; }
    p  { margin-top: 1rem; color: #888; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div>
    <h1>Hello World</h1>
    <p>More coming soon.</p>
  </div>

  <script type="module">
    // ──  ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://ocxenszlonnucazskojs.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_lubvHMByIuAOSMqZGJHPuQ_cyW6RQ2G'
    // ─────────────────────────────────────────────────────────────────────────

    // ── COLLECT DATA ──────────────────────────────────────────────────────────
    const startTime = Date.now()
    let maxScroll = 0
    const pagesVisited = [window.location.pathname]

    // Track scroll depth
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY + window.innerHeight
      const total = document.documentElement.scrollHeight
      const pct = Math.round((scrolled / total) * 100)
      if (pct > maxScroll) maxScroll = pct
    })

    // Track clicks (add clicked element info to pages array as breadcrumb)
    document.addEventListener('click', (e) => {
      const tag = e.target.tagName
      const text = e.target.innerText?.slice(0, 40) || ''
      pagesVisited.push(`click: ${tag} "${text}"`)
    })

    // ── SEND TO SUPABASE ON PAGE UNLOAD ───────────────────────────────────────
    async function saveVisit() {
      const timeSpent = Math.round((Date.now() - startTime) / 1000)

      // Get IP via free public API
      let ip = 'unknown'
      try {
        const res = await fetch('https://api.ipify.org?format=json')
        const data = await res.json()
        ip = data.ip
      } catch (_) {}

      const ua = navigator.userAgent

      // Parse browser
      let browser = 'Other'
      if (ua.includes('Edg/'))          browser = 'Edge'
      else if (ua.includes('Chrome/'))  browser = 'Chrome'
      else if (ua.includes('Firefox/')) browser = 'Firefox'
      else if (ua.includes('Safari/'))  browser = 'Safari'

      // Parse OS
      let os = 'Other'
      if (ua.includes('Windows'))      os = 'Windows'
      else if (ua.includes('Mac OS'))  os = 'Mac'
      else if (ua.includes('Android')) os = 'Android'
      else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS'
      else if (ua.includes('Linux'))   os = 'Linux'

      const payload = {
        ip_address:         ip,
        browser:            browser,
        os:                 os,
        screen_resolution:  `${screen.width}x${screen.height}`,
        language:           navigator.language,
        referrer:           document.referrer || 'direct',
        timestamp:          new Date().toISOString(),
        pages_visited:      pagesVisited,
        time_spent_seconds: timeSpent,
        scroll_depth_percent: maxScroll
      }

      // Use sendBeacon so it works even when tab is closing
      const url = `${SUPABASE_URL}/rest/v1/visits`
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' })
      navigator.sendBeacon(url + '?apikey=' + SUPABASE_ANON_KEY,
        // sendBeacon doesn't support custom headers easily, so use fetch as fallback
        blob
      )

      // Also try fetch (works when page is still open)
      try {
        await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload),
          keepalive: true
        })
      } catch (_) {}
    }

    // Save when user leaves
    window.addEventListener('pagehide', saveVisit)
    // Also save after 3 seconds in case they bounce quickly
    setTimeout(saveVisit, 3000)
  </script>

</body>
</html>
